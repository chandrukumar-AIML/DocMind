[mypy]
python_version = 3.11
strict = false

# Gradually-strict: enforce on core modules, be lenient on integration stubs
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = false
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true
pretty = true
show_error_codes = true

# Silence 3rd-party stubs we don't ship
[mypy-langchain.*]
ignore_missing_imports = true

[mypy-langgraph.*]
ignore_missing_imports = true

[mypy-chromadb.*]
ignore_missing_imports = true

[mypy-sentence_transformers.*]
ignore_missing_imports = true

[mypy-ragas.*]
ignore_missing_imports = true

[mypy-mlflow.*]
ignore_missing_imports = true

[mypy-celery.*]
ignore_missing_imports = true

[mypy-rank_bm25.*]
ignore_missing_imports = true

[mypy-nltk.*]
ignore_missing_imports = true

[mypy-PIL.*]
ignore_missing_imports = true

[mypy-evidently.*]
ignore_missing_imports = true
