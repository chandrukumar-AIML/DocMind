[pytest]
testpaths = app/tests
python_files = test_*.py
asyncio_mode = auto

markers =
    integration: marks tests that require a real database / Redis (deselect with -m "not integration")
    slow: marks slow tests (e.g. embedding generation, model loading)
    ocr: marks tests that require PaddleOCR installed

[coverage:run]
source = app
omit =
    app/tests/*
    app/database/schema.py
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == "__main__":
    raise NotImplementedError
    except ImportError
    TYPE_CHECKING
