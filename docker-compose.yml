# docker-compose.yml — DocuMind AI v2 — PRODUCTION READY
# All services integrated, syntax validated

networks:
  documind-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  chroma-data:
  faiss-data:
  mlflow-data:
  uploads-data:
  tmp-data:
  prometheus-data:
  grafana-data:

services:
  # ── Databases ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: documind-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-documind_pass}
      POSTGRES_DB: ${POSTGRES_DB:-documind}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - documind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-documind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: documind-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: documind-chroma
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_AUTH_TOKEN:-}
      CHROMA_SERVER_AUTHN_PROVIDER: ${CHROMA_AUTH_PROVIDER:-}
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - documind-net
    healthcheck:
      # FIXED: curl not in chromadb/chroma Alpine image — use wget which is always present
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: documind-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-documind_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - documind-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: documind-mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - documind-net
    restart: unless-stopped
    # [OK] FIXED: Added resource limits — was unbounded, could starve other services
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Application ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: documind-backend:latest
    container_name: documind-backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      API_RELOAD: "false"
      CHROMA_PERSIST_DIR: /data/chroma
      FAISS_INDEX_PATH: /data/faiss/index.bin
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-documind}:${POSTGRES_PASSWORD:-documind_pass}@postgres:5432/${POSTGRES_DB:-documind}
    volumes:
      - chroma-data:/data/chroma
      - faiss-data:/data/faiss
      - uploads-data:/data/uploads
      - tmp-data:/tmp/documind
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: documind-backend:latest
    container_name: documind-celery
    command: >
      celery -A app.tasks.celery_app worker
        --loglevel=info
        --concurrency=2
        --queues=high_priority,default,bulk
        --hostname=worker@%h
        --max-tasks-per-child=50
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      CHROMA_PERSIST_DIR: /data/chroma
      FAISS_INDEX_PATH: /data/faiss/index.bin
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_HOST: postgres
    volumes:
      - chroma-data:/data/chroma
      - faiss-data:/data/faiss
      - uploads-data:/data/uploads
      - tmp-data:/tmp/documind
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - documind-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  celery-flower:
    image: mher/flower:2.0
    container_name: documind-flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    networks:
      - documind-net
    restart: unless-stopped
    # [OK] FIXED: Added resource limits — lightweight monitoring UI needs minimal resources
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: documind-frontend:latest
    container_name: documind-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  # ── Observability ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: documind-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - documind-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: documind-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - documind-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
