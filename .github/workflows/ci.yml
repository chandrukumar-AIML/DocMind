name: CI/CD - DocuMind AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/documind-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/documind-frontend

jobs:
  # ── 0. Integration tests against real PostgreSQL ─────────────────────────
  integration:
    name: Backend — Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: documind
          POSTGRES_PASSWORD: documind_pass
          POSTGRES_DB: documind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run integration tests
        env:
          INTEGRATION_DB_URL: postgresql+asyncpg://documind:documind_pass@localhost:5432/documind_test
          DATABASE_URL: postgresql://documind:documind_pass@localhost:5432/documind_test
          JWT_SECRET_KEY: integration-test-secret-xxxxxxxxxxxxxxxxxxxxxxxxxxxx
          APP_API_KEYS: ci-test-api-key
          OPENAI_API_KEY: sk-test-fake-key-for-integration-tests
          REDIS_URL: ""
        run: |
          pytest app/tests/test_integration.py \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            -m integration \
            --timeout=60

  # ── 1. Backend: lint + test + coverage ──────────────────────────────────
  test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: ruff check app/ --output-format=github

      - name: Format check (ruff)
        run: ruff format app/ --check

      - name: Type check (mypy)
        run: mypy app/ --config-file mypy.ini --ignore-missing-imports

      - name: SAST scan (bandit)
        run: bandit -r app/ -c .bandit -ll -q

      - name: Run unit + contract tests with coverage
        env:
          OPENAI_API_KEY: sk-test-fake-key-for-unit-tests
          LANGCHAIN_API_KEY: ls-test-fake-key-for-unit-tests
          LANGCHAIN_PROJECT: documind-ai-ci
          API_RELOAD: "true"
          APP_API_KEYS: ci-test-api-key
          JWT_SECRET_KEY: ci-test-secret-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          REDIS_URL: ""
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          pytest app/tests/ \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            -m "not integration" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=20

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── 2. Frontend: lint + test + build ────────────────────────────────────
  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 3. Playwright E2E tests ─────────────────────────────────────────────
  e2e:
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Build for preview
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=github
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── 4. RAGAs quality gate ───────────────────────────────────────────────
  ragas:
    name: Backend — RAGAs Quality Gate
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run RAGAs quality gate
        env:
          # Real key required for LLM-based metrics; gate falls back to stub scores if absent
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_ENDPOINT_URL: http://localhost:8000
          RAGAS_THRESHOLD_FAITHFULNESS: "0.60"
          RAGAS_THRESHOLD_ANSWER_RELEVANCY: "0.55"
          RAGAS_THRESHOLD_CONTEXT_PRECISION: "0.50"
          RAGAS_THRESHOLD_COMPOSITE: "0.55"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET_KEY: ci-test-secret-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          APP_API_KEYS: ci-test-api-key
        run: python scripts/ragas_quality_gate.py --output ragas_scores.json

      - name: Upload RAGAs scores
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ragas-scores
          path: backend/ragas_scores.json
          retention-days: 30

  # ── 5. Docker images — build and push on main ───────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [integration, test, frontend, e2e, ragas]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,scope=backend-${{ github.ref_name }},mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,scope=frontend-${{ github.ref_name }},mode=max

  # ── 4. Deploy to Render (backend) + Vercel (frontend) ───────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # Deploy backend to Render via deploy hook
      - name: Trigger Render backend deploy
        if: vars.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ vars.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" \
            -H "Accept: application/json" \
            --fail-with-body
          echo "Backend deploy triggered on Render"

      # Deploy frontend to Vercel via CLI
      - name: Deploy frontend to Vercel
        if: secrets.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

      - name: Post-deploy smoke test (backend health)
        if: vars.BACKEND_URL != ''
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after deploy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS — retrying in 15s"
            sleep 15
          done
          echo "Backend failed health check after deploy"
          exit 1
