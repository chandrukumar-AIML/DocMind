<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply persisted theme before first paint to avoid a light/dark flash.
      try {
        var t = localStorage.getItem("dm_theme");
        document.documentElement.className = t === "light" ? "theme-light" : "dark";
      } catch (e) { /* storage unavailable — default dark */ }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocMind AI — Intelligent Document Intelligence</title>
    <meta name="description" content="Upload documents and ask questions. AI-powered RAG for your files." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
