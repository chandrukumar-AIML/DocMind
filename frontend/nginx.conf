# frontend/nginx.conf
# DVMELTSS-FIX: S - Security, P - Performance
# ASCALE-FIX: S - Separation, L - Layered

# Upstream for backend API (configured via env at runtime)
upstream backend_api {
    server ${BACKEND_HOST:-backend}:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Root for static files
    root /usr/share/nginx/html;
    index index.html;

    # Security: Disable server tokens
    server_tokens off;

    # Security: Basic headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Security: Content Security Policy (adjust for your needs)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ${BACKEND_HOST:-http://backend:8000} ws://${BACKEND_HOST:-backend}:8000 wss://${BACKEND_HOST:-backend}:8000; frame-ancestors 'none';" always;

    # Performance: Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Performance: Cache static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check endpoint for orchestration
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API proxy: Forward to backend with proper headers
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # WebSocket support for SSE/WS endpoints
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket endpoint proxy (if using separate WS path)
    location /ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s; # Long timeout for persistent WS
    }

    # SPA fallback: Serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (security)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|key|pem|crt|log|sql|bak|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}