global:
  resolve_timeout: 5m
  # SMTP (set via environment variables in production — never hard-code credentials)
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST:-smtp.gmail.com:587}"
  smtp_from: "${ALERTMANAGER_SMTP_FROM:-alerts@docmind.ai}"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USER}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD}"

# -- Routing tree ------------------------------------------------------------------
route:
  group_by: ["alertname", "team", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    # Critical alerts → PagerDuty (immediate on-call page) + Slack
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true   # also fan-out to Slack

    # All alerts → Slack
    - match_re:
        severity: "critical|warning"
      receiver: slack-alerts

    # Security alerts → dedicated security channel
    - match:
        team: security
      receiver: slack-security
      continue: true

    # AI/LLM alerts → AI team channel
    - match:
        team: ai
      receiver: slack-ai-team
      continue: true

# -- Inhibition rules (silence low-severity noise when critical fires) -----------
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]

# -- Receivers -------------------------------------------------------------------
receivers:
  - name: "default"
    email_configs:
      - to: "${ALERTMANAGER_EMAIL_TO:-oncall@docmind.ai}"
        send_resolved: true
        headers:
          subject: "[DocMind] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}"

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_INTEGRATION_KEY}"
        description: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
        severity: critical
        send_resolved: true

  - name: slack-alerts
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#docmind-alerts"
        send_resolved: true
        title: |
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}
        color: |
          {{ if eq .Status "firing" }}{{ if eq (index .GroupLabels "severity") "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}

  - name: slack-security
    slack_configs:
      - api_url: "${SLACK_SECURITY_WEBHOOK_URL:-${SLACK_WEBHOOK_URL}}"
        channel: "#security-alerts"
        send_resolved: true
        title: "[SECURITY] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}"
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}
        color: danger

  - name: slack-ai-team
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ai-platform-alerts"
        send_resolved: true
        title: "[AI] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}"
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}
