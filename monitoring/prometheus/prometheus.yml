global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: documind

scrape_configs:
  - job_name: documind-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: celery-worker
    static_configs:
      - targets: ["celery-exporter:9808"]
    scrape_interval: 30s

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s
